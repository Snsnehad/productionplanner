server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router uses client-side routing, so any unmatched path
    # should fall back to index.html instead of returning nginx's 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively; index.html stays uncached
    # so deploys are picked up immediately.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
